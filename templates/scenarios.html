        let currentScenario = null;
        
        // 页面加载
        $(document).ready(function() {
            renderScenarios('all');

        // 更新统计
        function updateStats() {
            $('#total-scenes').text(scenarios.length);
            $('#ready-scenes').text(scenarios.filter(s => s.difficulty === 'easy').length);
        }
        
        // 渲染场景列表
        function renderScenarios(filter) {
            const container = $('#scenarios-container');
            container.empty();
            
            const filtered = filter === 'all' 
                ? scenarios 
                : scenarios.filter(s => s.category === filter);
            
            filtered.forEach(scenario => {
                const card = `
                    <div class="col-md-4 mb-4">
                        <div class="card scenario-card" onclick="showScenarioDetail('${scenario.id}')">
                            <div class="card-body position-relative">
                                <span class="difficulty-badge diff-${scenario.difficulty}">${scenario.difficultyName}</span>
                                <div class="text-center">
                                    <div class="scenario-icon">
                                        <i class="fas ${scenario.icon}"></i>
                                    </div>
                                    <span class="scenario-category cat-${scenario.category}">${scenario.categoryName}</span>
                                    <h5 class="mt-2">${scenario.name}</h5>
                                    <p class="text-muted small">${scenario.description}</p>
                                </div>
                                <hr>
                                <ul class="feature-list pl-3">
                                    ${scenario.features.map(f => `<li><i class="fas fa-check text-success mr-1"></i>${f}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
                container.append(card);
            });
        }
        
        // 筛选场景
        function filterScenarios(category) {
            // 更新按钮状态
            $('.filter-btn').removeClass('active');
            $(event.target).addClass('active');
            
            // 重新渲染
            renderScenarios(category);
        }
        
        // 显示场景详情
        function showScenarioDetail(scenarioId) {
            currentScenario = scenarios.find(s => s.id === scenarioId);
            if (!currentScenario) return;
            
            $('#modal-title').text(currentScenario.name);
            $('#modal-content').html(`
                <div class="row">
                    <div class="col-md-8">
                        <h6><i class="fas fa-info-circle text-primary mr-2"></i>场景描述</h6>
                        <p>${currentScenario.description}</p>
                        
                        <h6><i class="fas fa-list-check text-success mr-2"></i>核心功能</h6>
                        <ul>
                            ${currentScenario.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        
                        <h6><i class="fas fa-cogs text-info mr-2"></i>实现方式</h6>
                        <p class="text-muted">${currentScenario.implementation}</p>
                        
                        <h6><i class="fas fa-envelope text-warning mr-2"></i>消息预览</h6>
                        <div class="bg-light p-3 rounded">
                            <pre class="mb-0" style="white-space: pre-wrap;">${currentScenario.demoMessage}</pre>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-light">
                            <div class="card-body">
                                <h6>场景信息</h6>
                                <p class="mb-1"><strong>分类：</strong>${currentScenario.categoryName}</p>
                                <p class="mb-1"><strong>难度：</strong>${currentScenario.difficultyName}</p>
                                <p class="mb-0"><strong>状态：</strong><span class="text-success">可用</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            `);
            
            $('#scenarioModal').modal('show');
        }
        
        // 使用场景
        function useScenario() {
            if (!currentScenario) return;
            
            // 跳转到每日推送页面，并携带场景参数
            const params = new URLSearchParams({
                scene: currentScenario.id,
                message: currentScenario.demoMessage
            });
            window.location.href = '/daily_push?' + params.toString();
        }
    </script>
